# Uncomment these two line to add support for encoders to your firmware
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the Kyria OLED Display
# CONFIG_ZMK_DISPLAY=y

# nie trzeba ale na przyszlosc mozna nadpisac nazwe BT
# CONFIG_ZMK_KEYBOARD_NAME="Ergo V1"

# Uncomment the following lines to enable RGB underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# sleep 
CONFIG_ZMK_SLEEP=y
# Idle after 30s (30000 ms)
CONFIG_ZMK_IDLE_TIMEOUT=30000
# Deep sleep after  (ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=5400000

# The shared configuration in my_awesome_split_board.conf is only applied when you are building with a zmk-config folder 
# and when it is present at config/my_awesome_split_board.conf. If you are not using a zmk-config folder, you will need 
# to include the shared configuration in both my_awesome_split_board_left.conf and my_awesome_split_board_right.conf files.
# building from zmk-config folder  https://zmk.dev/docs/development/build-flash#building-from-zmk-config-folder

# Boost Bluetooth TX power, also make Bluetooth stronger
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y        # Max transmit power for better range
# CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n  # Fixes issues with Windows/Android

# And if you don't need many active profiles you can limit them to have a faster connection: 
# Tune bluetooth profiles for quick select
# CONFIG_BT_MAX_CONN=3

# USB Logging on COM port ON
# CONFIG_ZMK_USB_LOGGING=y

# Enables a combination of settings that are planned to be default in future versions of ZMK to improve connection stability. This includes changes to timing on BLE pairing initiation, restores use of the updated/new LLCP implementation, and disables 2M PHY support.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Enables a combination of settings that are planned to be officially supported in the future. This includes enabling BT Secure Connection passkey entry, and allows overwrite of keys from previously paired hosts.
CONFIG_ZMK_BLE_EXPERIMENTAL_SEC=y

# Aggregate config that enables both CONFIG_ZMK_BLE_EXPERIMENTAL_CONN and CONFIG_ZMK_BLE_EXPERIMENTAL_SEC.
# CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

#  Studio
#CONFIG_ZMK_STUDIO=y
# Disable auto-lock in Studio
#CONFIG_ZMK_STUDIO_LOCKING=n
# Lock after 600ms 10min idle (default)
#CONFIG_ZMK_STUDIO_LOCK_IDLE_TIMEOUT_SEC=600

# Controls how media keys (volume up/down, play/pause, next track, etc.) 
# are reported to your PC. Without it, ZMK only sends a small subset of media 
# key codes. With it enabled, the full range of consumer HID codes works 
# — things like brightness keys, calculator shortcut, etc. 
# Enable it if you have media keys in your keymap.
# CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_FULL=y   # Full media key support

# Fast typer or want no limit on simultaneous keypresses? 
# NKRO = N-Key Rollover. This means the keyboard can report every single key 
# pressed simultaneously with no limit. Without it, ZMK uses the standard 6-key rollover 
# (you can only hold 6 regular keys at once before some get dropped). With it enabled, 
# all keys pressed at the same time are always registered.
# One caveat — NKRO can occasionally cause compatibility issues with some older BIOSes or KVM switches. 
# On a modern PC it's fine.
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=y
CONFIG_ZMK_HID_KEYBOARD_NKRO_EXTENDED_REPORT=y